<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">A-share Evidence Radar</title>
  <desc id="desc">Evidence-first event fusion for low-noise A-share alerts</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081426"/>
      <stop offset="0.58" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0b3b3c"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#45d6c1"/>
      <stop offset="1" stop-color="#8bf2a7"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#cbe8ff" stroke-width="1">
    <path d="M0 72H1200M0 144H1200M0 216H1200M0 288H1200"/>
    <path d="M120 0V360M240 0V360M360 0V360M480 0V360M600 0V360M720 0V360M840 0V360M960 0V360M1080 0V360"/>
  </g>
  <g transform="translate(810 42)">
    <circle cx="140" cy="140" r="104" fill="none" stroke="#45d6c1" stroke-width="2" opacity="0.28"/>
    <circle cx="140" cy="140" r="72" fill="none" stroke="#45d6c1" stroke-width="2" opacity="0.4"/>
    <circle cx="140" cy="140" r="40" fill="#45d6c1" opacity="0.1"/>
    <path d="M140 140L232 84" stroke="url(#line)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="140" cy="140" r="8" fill="#d8fff6"/>
    <circle cx="232" cy="84" r="7" fill="#8bf2a7" filter="url(#glow)"/>
    <circle cx="72" cy="102" r="5" fill="#71b7ff"/>
    <circle cx="196" cy="210" r="5" fill="#71b7ff"/>
    <circle cx="248" cy="158" r="5" fill="#71b7ff"/>
  </g>
  <g font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif">
    <text x="74" y="104" fill="#8bf2a7" font-size="18" font-weight="700" letter-spacing="3">EVIDENCE FIRST · LOW NOISE</text>
    <text x="72" y="171" fill="#ffffff" font-size="52" font-weight="750">A-share Evidence Radar</text>
    <text x="74" y="220" fill="#d2e7f7" font-size="23">Auditable event cards from disclosures, news, and market reactions</text>
    <g transform="translate(74 260)">
      <rect width="150" height="42" rx="21" fill="#45d6c1" opacity="0.16"/>
      <text x="75" y="28" fill="#9ff5e7" font-size="15" font-weight="650" text-anchor="middle">4 QUALITY GATES</text>
      <rect x="164" width="156" height="42" rx="21" fill="#71b7ff" opacity="0.14"/>
      <text x="242" y="28" fill="#b9dcff" font-size="15" font-weight="650" text-anchor="middle">PUBLIC BENCHMARK</text>
      <rect x="334" width="178" height="42" rx="21" fill="#8bf2a7" opacity="0.13"/>
      <text x="423" y="28" fill="#c3ffd0" font-size="15" font-weight="650" text-anchor="middle">ZERO DEPENDENCIES</text>
    </g>
  </g>
</svg>
