name: Bug report
description: Report a reproducible defect without sharing secrets or private holdings.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Remove webhook URLs, tokens, cookies, and real portfolio data before submitting.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Include the command, expected result, and actual result.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Prefer a small fictional event/watchlist fixture.
      render: shell
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, Python 3.12, Codex desktop
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, cookies, and private holdings.
          required: true
