name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile scripts
        shell: python
        run: |
          from pathlib import Path
          import py_compile
          for path in Path("skills/monitor-a-share-events/scripts").glob("*.py"):
              py_compile.compile(str(path), doraise=True)
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate example config offline
        run: python skills/monitor-a-share-events/scripts/validate_config.py --config skills/monitor-a-share-events/assets/examples/radar-config.json
      - name: Run public benchmark
        run: python skills/monitor-a-share-events/scripts/evaluate_radar.py
      - name: Run offline doctor
        run: python skills/monitor-a-share-events/scripts/doctor.py
